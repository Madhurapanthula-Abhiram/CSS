<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="transition.css">
</head>
<body>
    <h1>Contents</h1>
    <ul>
        <li>transition-property:all/font-size/width</li>
        <li>transition-duration:1s/2s.0.2s/2ms</li>
        <li>transition-timing-duration:steps(4),ease-in,ease-out/ease-in-out</li>
        <li>transition-delay:2s/1s/0.1s..</li>
        <li>box-shadow:px right px bottom px blur color</li>
    </ul>
    <div id="outer">
        <div id="box1">Box1</div>
        <div id="box2">Box2</div>
        <div id="box3">Box3</div>
    </div>
</body>
</html>
